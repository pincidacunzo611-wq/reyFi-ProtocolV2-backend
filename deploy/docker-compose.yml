# deploy/docker-compose.yml — 生产部署
version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: reyfi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: reyfi
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: reyfi-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  kafka:
    image: bitnami/kafka:3.6
    container_name: reyfi-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    container_name: reyfi-gateway
    ports:
      - "8888:8888"
    depends_on:
      - redis
    environment:
      - ENV=production

  chain-indexer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.indexer
    container_name: reyfi-indexer
    depends_on:
      - mysql
      - kafka
    environment:
      - ENV=production

  dex-rpc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dex
    container_name: reyfi-dex
    ports:
      - "9001:9001"
    depends_on:
      - mysql
      - redis
      - kafka
    environment:
      - ENV=production

  user-rpc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.user
    container_name: reyfi-user
    ports:
      - "9008:9008"
    depends_on:
      - mysql
      - redis
    environment:
      - ENV=production

  nginx:
    image: nginx:alpine
    container_name: reyfi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway

volumes:
  mysql_data:
  redis_data:
  kafka_data:
